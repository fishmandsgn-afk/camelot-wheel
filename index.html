<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Колесо Камелота</title>
<style>
  :root{
    --bg:#14151a;
    --panel:#1d1f27;
    --text:#eceef2;
    --muted:#8a8d99;
    --accent:#f2545b;
    --accent2:#4fd1c5;
    --accent3:#f5a623;
    --outer-fill:#2a2d3a;
    --inner-fill:#232633;
    --stroke:#0e0f13;
    --bg-grad:#22242e;
    --chip-bg:#2a2d3a;
    --border:#3a3d4a;
    --dim-note:#54576a;
  }
  :root[data-theme="light"]{
    --bg:#f3f4f7;
    --panel:#ffffff;
    --text:#1c1e26;
    --muted:#6c7080;
    --accent:#e0454b;
    --accent2:#0ea99a;
    --accent3:#d98209;
    --outer-fill:#e6e8ee;
    --inner-fill:#eef0f5;
    --stroke:#c7cad4;
    --bg-grad:#ffffff;
    --chip-bg:#eef0f5;
    --border:#d3d6e0;
    --dim-note:#a7abb8;
  }
  }
  *{box-sizing:border-box;}
  html, body{
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  body{
    margin:0;
    min-height:100svh;
    background:radial-gradient(circle at 50% 15%, var(--bg-grad), var(--bg) 60%);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:16px 12px calc(32px + env(safe-area-inset-bottom));
  }
  h1{
    font-size:clamp(18px,5vw,22px);
    font-weight:600;
    margin:4px 0 4px;
    letter-spacing:.2px;
    text-align:center;
  }
  p.sub{
    color:var(--muted);
    font-size:13px;
    margin:0 0 16px;
    text-align:center;
    max-width:340px;
  }
  #wrap{
    position:relative;
    width:min(94vw,400px);
    aspect-ratio:1/1;
    touch-action: manipulation;
  }
  svg{
    width:100%;
    height:100%;
    aspect-ratio:1/1;
    display:block;
    user-select:none;
    -webkit-user-select:none;
  }
  .seg-group{
    transition:opacity .12s ease;
  }
  .seg{
    cursor:pointer;
    stroke:var(--stroke);
    stroke-width:2.5;
    transition:fill .12s ease, filter .12s ease;
  }
  .seg.outer{fill:var(--outer-fill);}
  .seg.inner{fill:var(--inner-fill);}
  .seg:active{filter:brightness(1.3);}
  .seg-group.selected .seg{fill:var(--accent)!important;}
  .seg-group.compatible .seg{fill:var(--accent2)!important;}
  .seg-group.extreme .seg{fill:var(--accent3)!important;}
  .seg-group.dim{opacity:.3;}
  .label{
    font-size:14px;
    font-weight:700;
    fill:var(--text);
    pointer-events:none;
    text-anchor:middle;
    dominant-baseline:middle;
    transition:fill .12s ease;
  }
  .label.note{
    font-size:10px;
    font-weight:500;
    fill:var(--muted);
    pointer-events:none;
    text-anchor:middle;
    dominant-baseline:middle;
    transition:fill .12s ease;
  }
  .seg-group.dim .label{fill:var(--muted);}
  .seg-group.dim .label.note{fill:var(--dim-note);}
  .seg-group.selected .label,
  .seg-group.compatible .label,
  .seg-group.extreme .label,
  .seg-group.selected .label.note,
  .seg-group.compatible .label.note,
  .seg-group.extreme .label.note{fill:#101116;}
  #legend{
    margin-top:16px;
    display:flex;
    gap:14px;
    flex-wrap:wrap;
    justify-content:center;
    font-size:12px;
    color:var(--muted);
  }
  .dot{
    display:inline-block;
    width:10px;height:10px;
    border-radius:50%;
    margin-right:6px;
    vertical-align:middle;
  }
  #info{
    margin-top:16px;
    width:min(94vw,400px);
    background:var(--panel);
    border-radius:14px;
    padding:14px 16px;
    min-height:56px;
    font-size:14px;
    line-height:1.5;
  }
  #info .title{
    font-weight:700;
    font-size:16px;
    margin-bottom:6px;
  }
  #info .compat-item{
    display:inline-block;
    background:var(--chip-bg);
    border-radius:8px;
    padding:5px 10px;
    margin:3px 4px 0 0;
    font-weight:600;
    font-size:13px;
  }
  #info .extreme-item{
    display:inline-block;
    background:rgba(245,166,35,.15);
    border:1px solid rgba(245,166,35,.4);
    border-radius:8px;
    padding:5px 10px;
    margin:3px 4px 0 0;
    font-weight:600;
    font-size:13px;
    color:var(--accent3);
  }
  #info .section-label{
    display:block;
    margin-top:12px;
    font-size:12px;
    color:var(--muted);
  }
  #extremeToggle{
    display:flex;
    align-items:center;
    gap:10px;
    margin-top:14px;
    font-size:13px;
    color:var(--muted);
    cursor:pointer;
    -webkit-tap-highlight-color: transparent;
    user-select:none;
  }
  #extremeToggle .switch{
    width:38px;
    height:22px;
    border-radius:12px;
    background:var(--chip-bg);
    border:1px solid var(--border);
    position:relative;
    flex-shrink:0;
    transition:background .15s ease, border-color .15s ease;
  }
  #extremeToggle .switch::after{
    content:"";
    position:absolute;
    top:2px; left:2px;
    width:16px; height:16px;
    border-radius:50%;
    background:var(--muted);
    transition:transform .15s ease, background .15s ease;
  }
  #extremeToggle.on{color:var(--text);}
  #extremeToggle.on .switch{background:rgba(245,166,35,.25); border-color:var(--accent3);}
  #extremeToggle.on .switch::after{transform:translateX(16px); background:var(--accent3);}
  #reset{
    margin-top:14px;
    background:none;
    border:1px solid var(--border);
    color:var(--muted);
    padding:10px 18px;
    border-radius:10px;
    font-size:14px;
    cursor:pointer;
    -webkit-tap-highlight-color: transparent;
  }
  #reset:active{color:var(--text); border-color:var(--muted); background:var(--chip-bg);}
  .theme-toggle{
    position:fixed;
    left:10px;
    top:50%;
    transform:translateY(-50%);
    width:38px;
    height:38px;
    border-radius:50%;
    background:var(--panel);
    border:1px solid var(--border);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    z-index:100;
    -webkit-tap-highlight-color: transparent;
    box-shadow:0 4px 14px rgba(0,0,0,.25);
    color:var(--accent3);
  }
  .theme-toggle .icon{display:none;}
  .theme-toggle .icon svg{display:block;}
  .theme-toggle .icon.moon{display:flex;}
  :root[data-theme="light"] .theme-toggle .icon.moon{display:none;}
  :root[data-theme="light"] .theme-toggle .icon.sun{display:flex;}
</style>
</head>

<body>

<div id="themeToggle" class="theme-toggle" role="button" aria-label="Перемкнути тему">
  <span class="icon sun">
    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <circle cx="12" cy="12" r="5"/>
      <line x1="12" y1="1" x2="12" y2="3"/>
      <line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/>
      <line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
  </span>
  <span class="icon moon">
    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </span>
</div>

<h1>Колесо Камелота</h1>
<p class="sub">Натисни на свою тональність — підсвітяться ті, з якими вона добре зводиться (гармонічний мікс).</p>

<div id="wrap">
  <svg id="wheelSvg" viewBox="0 0 500 500" width="500" height="500"></svg>
</div>

<div id="legend">
  <span><span class="dot" style="background:var(--accent)"></span>обрана тональність</span>
  <span><span class="dot" style="background:var(--accent2)"></span>сумісні для зведення</span>
  <span><span class="dot" style="background:var(--accent3)"></span>екстремальні (+2 / +7)</span>
</div>

<div id="extremeToggle">
  <span class="switch"></span>
  Показати екстремальні переходи (+2 / +7)
</div>

<div id="info">Обери тональність на колесі, щоб побачити варіанти зведення.</div>
<button id="reset">Скинути вибір</button>

<script>
// Стандартне колесо Камелота: номер + B (мажор, зовнішнє кільце) / A (мінор, внутрішнє кільце)
const KEYS = [
  {num:1,  major:"B",  minor:"Ab"},
  {num:2,  major:"F#", minor:"Eb"},
  {num:3,  major:"Db", minor:"Bb"},
  {num:4,  major:"Ab", minor:"F"},
  {num:5,  major:"Eb", minor:"C"},
  {num:6,  major:"Bb", minor:"G"},
  {num:7,  major:"F",  minor:"D"},
  {num:8,  major:"C",  minor:"A"},
  {num:9,  major:"G",  minor:"E"},
  {num:10, major:"D",  minor:"B"},
  {num:11, major:"A",  minor:"F#"},
  {num:12, major:"E",  minor:"C#"},
];

const svgNS = "http://www.w3.org/2000/svg";
const svg = document.getElementById("wheelSvg");
const cx = 250, cy = 250;
const rOuterOut = 235, rOuterIn = 150, rInnerOut = 148, rInnerIn = 65;

function polar(r, angleDeg){
  const a = (angleDeg - 90) * Math.PI/180;
  return [cx + r*Math.cos(a), cy + r*Math.sin(a)];
}

function arcPath(rOut, rIn, startAngle, endAngle){
  const [x1,y1] = polar(rOut, startAngle);
  const [x2,y2] = polar(rOut, endAngle);
  const [x3,y3] = polar(rIn, endAngle);
  const [x4,y4] = polar(rIn, startAngle);
  const large = (endAngle-startAngle) > 180 ? 1 : 0;
  return `M ${x1} ${y1} A ${rOut} ${rOut} 0 ${large} 1 ${x2} ${y2} L ${x3} ${y3} A ${rIn} ${rIn} 0 ${large} 0 ${x4} ${y4} Z`;
}

const segAngle = 360/12;
let selected = null; // {num, letter}

function keyId(num, letter){ return num+letter; }

function drawWheel(){
  svg.innerHTML = "";
  KEYS.forEach((k, i)=>{
    const start = i*segAngle - segAngle/2;
    const end = start + segAngle;
    const mid = (start+end)/2;

    // outer = major (B) — path + its labels live in one group so they dim/highlight together
    const outerG = document.createElementNS(svgNS,"g");
    outerG.setAttribute("class","seg-group");
    outerG.id = "seg-"+keyId(k.num,"B");

    const outerPath = document.createElementNS(svgNS,"path");
    outerPath.setAttribute("d", arcPath(rOuterOut, rOuterIn, start, end));
    outerPath.setAttribute("class","seg outer");
    outerPath.dataset.num = k.num;
    outerPath.dataset.letter = "B";
    outerPath.addEventListener("click", ()=>selectKey(k.num,"B"));
    outerG.appendChild(outerPath);

    const outerLabel = document.createElementNS(svgNS,"text");
    const [lx,ly] = polar((rOuterOut+rOuterIn)/2 + 10, mid);
    outerLabel.setAttribute("x", lx);
    outerLabel.setAttribute("y", ly);
    outerLabel.setAttribute("class","label");
    outerLabel.textContent = k.num+"B";
    outerG.appendChild(outerLabel);

    const outerNote = document.createElementNS(svgNS,"text");
    const [nx,ny] = polar((rOuterOut+rOuterIn)/2 - 14, mid);
    outerNote.setAttribute("x", nx);
    outerNote.setAttribute("y", ny);
    outerNote.setAttribute("class","label note");
    outerNote.textContent = k.major;
    outerG.appendChild(outerNote);

    svg.appendChild(outerG);

    // inner = minor (A)
    const innerG = document.createElementNS(svgNS,"g");
    innerG.setAttribute("class","seg-group");
    innerG.id = "seg-"+keyId(k.num,"A");

    const innerPath = document.createElementNS(svgNS,"path");
    innerPath.setAttribute("d", arcPath(rInnerOut, rInnerIn, start, end));
    innerPath.setAttribute("class","seg inner");
    innerPath.dataset.num = k.num;
    innerPath.dataset.letter = "A";
    innerPath.addEventListener("click", ()=>selectKey(k.num,"A"));
    innerG.appendChild(innerPath);

    const innerLabel = document.createElementNS(svgNS,"text");
    const [ilx,ily] = polar((rInnerOut+rInnerIn)/2 + 8, mid);
    innerLabel.setAttribute("x", ilx);
    innerLabel.setAttribute("y", ily);
    innerLabel.setAttribute("class","label");
    innerLabel.textContent = k.num+"A";
    innerG.appendChild(innerLabel);

    const innerNote = document.createElementNS(svgNS,"text");
    const [inx,iny] = polar((rInnerOut+rInnerIn)/2 - 12, mid);
    innerNote.setAttribute("x", inx);
    innerNote.setAttribute("y", iny);
    innerNote.setAttribute("class","label note");
    innerNote.textContent = k.minor+"m";
    innerG.appendChild(innerNote);

    svg.appendChild(innerG);
  });
}

function wrapNum(n){
  return ((n - 1) % 12 + 12) % 12 + 1;
}

function getCompatible(num, letter){
  const prev = num===1 ? 12 : num-1;
  const next = num===12 ? 1 : num+1;
  const otherLetter = letter==="A" ? "B" : "A";
  return [
    {num:prev, letter, label:"−1 (той самий лад)"},
    {num:next, letter, label:"+1 (той самий лад)"},
    {num:num, letter:otherLetter, label:"паралельна тональність"},
  ];
}

function getExtreme(num, letter){
  return [
    {num:wrapNum(num+2), letter, tag:"+2", label:"різкий зсув"},
    {num:wrapNum(num+7), letter, tag:"+7", label:"енергетичний буст"},
  ];
}

let showExtreme = false;

function keyName(num, letter){
  const k = KEYS.find(x=>x.num===num);
  return letter==="B" ? `${k.major} major` : `${k.minor} minor`;
}

function selectKey(num, letter){
  if(selected && selected.num===num && selected.letter===letter){
    selected = null;
  } else {
    selected = {num, letter};
  }
  render();
}

function render(){
  document.querySelectorAll(".seg-group").forEach(el=>{
    el.classList.remove("selected","compatible","extreme","dim");
  });

  const info = document.getElementById("info");

  if(!selected){
    info.innerHTML = "Обери тональність на колесі, щоб побачити варіанти зведення.";
    return;
  }

  document.querySelectorAll(".seg-group").forEach(el=>el.classList.add("dim"));

  const selEl = document.getElementById("seg-"+keyId(selected.num, selected.letter));
  selEl.classList.remove("dim");
  selEl.classList.add("selected");

  const compat = getCompatible(selected.num, selected.letter);
  let itemsHtml = "";
  compat.forEach(c=>{
    const el = document.getElementById("seg-"+keyId(c.num,c.letter));
    el.classList.remove("dim");
    el.classList.add("compatible");
    itemsHtml += `<span class="compat-item">${c.num}${c.letter} — ${keyName(c.num,c.letter)}</span>`;
  });

  let extremeHtml = "";
  if(showExtreme){
    const extreme = getExtreme(selected.num, selected.letter);
    extreme.forEach(e=>{
      const el = document.getElementById("seg-"+keyId(e.num, e.letter));
      // не перебиваємо колір, якщо цей сектор вже позначено як звичний сумісний
      if(!el.classList.contains("compatible") && !el.classList.contains("selected")){
        el.classList.remove("dim");
        el.classList.add("extreme");
      }
      extremeHtml += `<span class="extreme-item">${e.tag}: ${e.num}${e.letter} — ${keyName(e.num,e.letter)} (${e.label})</span>`;
    });
  }

  info.innerHTML = `
    <div class="title">${selected.num}${selected.letter} — ${keyName(selected.num, selected.letter)}</div>
    Добре зводиться з:<br>
    ${itemsHtml}
    ${extremeHtml ? `<span class="section-label">Екстремальні переходи — використовуй для драматичних моментів, звучить різкіше:</span>${extremeHtml}` : ""}
  `;
}

document.getElementById("extremeToggle").addEventListener("click", (e)=>{
  showExtreme = !showExtreme;
  e.currentTarget.classList.toggle("on", showExtreme);
  render();
});

document.getElementById("reset").addEventListener("click", ()=>{
  selected = null;
  render();
});

// Тема (світла/темна), збережена між відкриттями
function applyTheme(theme){
  document.documentElement.setAttribute("data-theme", theme === "light" ? "light" : "dark");
}
let initialTheme = "dark";
try{
  const saved = localStorage.getItem("camelot-theme");
  if(saved === "light" || saved === "dark") initialTheme = saved;
} catch(e){}
applyTheme(initialTheme);

document.getElementById("themeToggle").addEventListener("click", ()=>{
  const current = document.documentElement.getAttribute("data-theme") === "light" ? "light" : "dark";
  const next = current === "light" ? "dark" : "light";
  applyTheme(next);
  try{ localStorage.setItem("camelot-theme", next); } catch(e){}
});

drawWheel();
render();
</script>
</body>
</html>
